<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=DM+Sans:wght@400;500;700;800&display=swap" rel="stylesheet">

<style>
:root{
    --mx: 50%;
    --my: 50%;
}

*{
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

html{
    overflow: hidden;
}

body{
    height: 100vh;
    overflow: hidden;
    display: flex;
    align-items: center;
    justify-content: center;
    color: #fff;
    position: relative;
    background: radial-gradient(circle at top, #0b1020 0%, #05060c 55%, #020309 100%);
    font-family: "Inter", sans-serif;
}

/* 🌌 Long cosmic rays */
body::before{
    content: "";
    position: absolute;
    width: 520%;
    height: 520%;
    left: 50%;
    top: 50%;
    transform: translate(-50%, -50%);
    background: linear-gradient(
        120deg,
        transparent 46%,
        rgba(120,180,255,0.10),
        transparent 54%
    );
    animation: spin 45s linear infinite;
    opacity: 0.75;
    z-index: 0;
}

@keyframes spin{
    from { transform: translate(-50%, -50%) rotate(0deg); }
    to   { transform: translate(-50%, -50%) rotate(360deg); }
}

/* 🌫 Nebula */
.nebula{
    position: absolute;
    inset: -35%;
    background:
        radial-gradient(circle at 25% 35%, rgba(120,80,255,0.28), transparent 60%),
        radial-gradient(circle at 70% 60%, rgba(80,200,255,0.18), transparent 65%),
        radial-gradient(circle at 55% 25%, rgba(255,120,200,0.12), transparent 65%),
        radial-gradient(circle at 50% 80%, rgba(120,255,220,0.08), transparent 60%);
    filter: blur(140px);
    opacity: 0.95;
    animation: nebulaMove 14s ease-in-out infinite alternate;
    z-index: 0;
    pointer-events: none;
}

@keyframes nebulaMove{
    from { transform: scale(1); }
    to   { transform: scale(1.18); }
}

/* ✨ Stars */
.stars-1, .stars-2, .stars-3{
    position: absolute;
    inset: 0;
    pointer-events: none;
    z-index: 1;
}

.stars-1{
    background-image:
        radial-gradient(1px 1px at 10% 15%, rgba(255,255,255,0.9), transparent),
        radial-gradient(1px 1px at 20% 75%, rgba(255,255,255,0.8), transparent),
        radial-gradient(1px 1px at 35% 40%, rgba(255,255,255,0.75), transparent),
        radial-gradient(1px 1px at 50% 60%, rgba(255,255,255,0.7), transparent),
        radial-gradient(1px 1px at 65% 25%, rgba(255,255,255,0.8), transparent),
        radial-gradient(1px 1px at 80% 55%, rgba(255,255,255,0.7), transparent),
        radial-gradient(1px 1px at 90% 20%, rgba(255,255,255,0.6), transparent);
    opacity: 0.45;
    animation: starDrift1 55s linear infinite;
}

.stars-2{
    background-image:
        radial-gradient(2px 2px at 15% 35%, rgba(200,220,255,0.85), transparent),
        radial-gradient(2px 2px at 45% 20%, rgba(255,255,255,0.8), transparent),
        radial-gradient(2px 2px at 70% 75%, rgba(210,230,255,0.75), transparent),
        radial-gradient(2px 2px at 88% 45%, rgba(200,220,255,0.7), transparent);
    opacity: 0.22;
    animation: starDrift2 75s linear infinite;
}

.stars-3{
    background-image:
        radial-gradient(1px 1px at 12% 55%, rgba(255,255,255,0.55), transparent),
        radial-gradient(1px 1px at 38% 85%, rgba(255,255,255,0.5), transparent),
        radial-gradient(1px 1px at 58% 35%, rgba(255,255,255,0.45), transparent),
        radial-gradient(1px 1px at 82% 10%, rgba(255,255,255,0.5), transparent);
    opacity: 0.18;
    animation: starDrift3 95s linear infinite;
}

@keyframes starDrift1{
    from { transform: translateY(0); }
    to   { transform: translateY(-320px); }
}
@keyframes starDrift2{
    from { transform: translateY(0); }
    to   { transform: translateY(-520px); }
}
@keyframes starDrift3{
    from { transform: translateY(0); }
    to   { transform: translateY(-720px); }
}

/* 🌑 Vignette */
.vignette{
    position: absolute;
    inset: 0;
    background: radial-gradient(circle, transparent 30%, rgba(0,0,0,0.70) 100%);
    z-index: 2;
    pointer-events: none;
}

/* ☄️ Shooting stars */
.meteor{
    position: absolute;
    width: 280px;
    height: 2px;
    opacity: 0;
    z-index: 3;
    pointer-events: none;
    background: linear-gradient(
        90deg,
        rgba(255,255,255,0.95) 0%,
        rgba(255,255,255,0.55) 30%,
        transparent 100%
    );
    filter: drop-shadow(0 0 10px rgba(160,200,255,0.9));
    transform: rotate(35deg);
    animation: meteorFly 3.2s linear infinite;
}

.meteor.m1{ top: 12%; left: -45%; animation-delay: 0.5s; }
.meteor.m2{ top: 28%; left: -55%; width: 230px; animation-delay: 1.6s; }
.meteor.m3{ top: 52%; left: -50%; width: 320px; animation-delay: 2.8s; }
.meteor.m4{ top: 72%; left: -60%; width: 260px; animation-delay: 4.1s; }

@keyframes meteorFly{
    0%{
        transform: translateX(0) translateY(0) rotate(35deg);
        opacity: 0;
    }
    10%{
        opacity: 1;
    }
    100%{
        transform: translateX(180vw) translateY(85vh) rotate(35deg);
        opacity: 0;
    }
}

/* ✨ Mouse glow */
.mouse-glow{
    position: absolute;
    inset: 0;
    background: radial-gradient(
        circle at var(--mx) var(--my),
        rgba(140,180,255,0.12),
        transparent 45%
    );
    pointer-events: none;
    z-index: 4;
}

/* Wrapper */
.page{
    position: relative;
    z-index: 5;
    width: min(460px, 92%);
    text-align: center;
}

/* Title outside card */
.page-title{
    font-family: "DM Sans", sans-serif;
    font-size: 2.6rem;
    font-weight: 800;
    letter-spacing: 1px;
    margin-bottom: 6px;
    color: transparent;
    background: linear-gradient(90deg, #8ab4ff, #ffffff);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    filter: drop-shadow(0 0 28px rgba(138,180,255,0.55));
}

.page-subtitle{
    font-size: 0.95rem;
    opacity: 0.78;
    margin-bottom: 22px;
    letter-spacing: 0.5px;
}

/* Card */
.login-box{
    text-align: left;
    padding: 44px 38px;
    border-radius: 26px;
    background: rgba(15,20,45,0.72);
    backdrop-filter: blur(18px);
    border: 1px solid rgba(255,255,255,0.12);
    box-shadow: 0 0 55px rgba(100,140,255,0.18);
}

.login-box.error{
    box-shadow:
        0 0 55px rgba(255, 80, 120, 0.75),
        inset 0 0 22px rgba(255, 80, 120, 0.25);
    border-color: rgba(255, 120, 160, 0.35);
}

/* Inputs */
.login-box input{
    width: 100%;
    padding: 14px 14px;
    margin-bottom: 16px;
    border-radius: 14px;
    border: 1px solid rgba(255,255,255,0.14);
    background: rgba(0,0,0,0.35);
    color: #fff;
    font-size: 14.5px;
    outline: none;
    transition: all 0.25s ease;
    font-family: "Inter", sans-serif;
}

.login-box input::placeholder{
    color: rgba(255,255,255,0.55);
}

.login-box input:focus{
    border-color: rgba(138,180,255,0.55);
    box-shadow: 0 0 14px rgba(138,180,255,0.45);
}

/* Button */
.login-box button{
    width: 100%;
    padding: 14px;
    border-radius: 16px;
    border: none;
    cursor: pointer;
    font-family: "DM Sans", sans-serif;
    font-size: 1rem;
    font-weight: 800;
    color: #0b1020;
    background: linear-gradient(135deg, #8ab4ff, #cfd9ff);
    box-shadow: 0 0 28px rgba(138,180,255,0.55);
    transition: transform 0.25s ease, box-shadow 0.25s ease;
}

.login-box button:hover{
    transform: translateY(-2px);
    box-shadow: 0 0 40px rgba(138,180,255,0.80);
}

/* Links */
.login-links{
    text-align: center;
    margin-top: 18px;
    font-size: 13.5px;
    color: rgba(255,255,255,0.75);
}

.login-links a{
    color: #8ab4ff;
    text-decoration: none;
    font-weight: 700;
}

.login-links a:hover{
    text-decoration: underline;
}

/* Error text */
.error-text{
    color: #ff7a9c;
    text-align: center;
    margin-top: 12px;
    font-size: 13.5px;
    font-weight: 600;
}
</style>
</head>

<body>

<div class="nebula"></div>

<div class="stars-1"></div>
<div class="stars-2"></div>
<div class="stars-3"></div>

<div class="vignette"></div>

<div class="meteor m1"></div>
<div class="meteor m2"></div>
<div class="meteor m3"></div>
<div class="meteor m4"></div>

<div class="mouse-glow"></div>

<div class="page">
    <div class="page-title">Welcome Back</div>
    <div class="page-subtitle">Enter your credentials to continue</div>

    <div class="login-box {{ error_class }}">
        <form method="POST" action="/login">
            <input type="text" name="identifier" placeholder="Username or Email" required>
            <input type="password" name="password" placeholder="Password" required>
            <button type="submit">Login</button>
        </form>

        {% if error %}
            <p class="error-text">{{ error }}</p>
        {% endif %}

        <div class="login-links">
            Don’t have an account? <a href="/register">Register</a>
        </div>
    </div>
</div>

<script>
document.addEventListener("mousemove", function(e){
    document.documentElement.style.setProperty("--mx", e.clientX + "px");
    document.documentElement.style.setProperty("--my", e.clientY + "px");
});
</script>

</body>
</html>
