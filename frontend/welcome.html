<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Welcome</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700;900&family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>
*{
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

html{
    overflow: hidden;
}

body{
    height: 100vh;
    overflow: hidden;
    display: flex;
    align-items: center;
    justify-content: center;
    color: white;
    position: relative;
    background: radial-gradient(circle at top, #0b1020 0%, #05060c 55%, #020309 100%);
}

/* 🌌 Long glare rays (infinite length) */
body::before{
    content: "";
    position: absolute;
    width: 550%;
    height: 550%;
    left: 50%;
    top: 50%;
    transform: translate(-50%, -50%);
    background: linear-gradient(
        120deg,
        transparent 46%,
        rgba(120,180,255,0.12),
        transparent 54%
    );
    animation: spin 42s linear infinite;
    opacity: 0.8;
    z-index: 0;
}

@keyframes spin{
    from { transform: translate(-50%, -50%) rotate(0deg); }
    to   { transform: translate(-50%, -50%) rotate(360deg); }
}

/* 🌫 Nebula haze */
.nebula{
    position: absolute;
    inset: -35%;
    background:
        radial-gradient(circle at 20% 30%, rgba(120,80,255,0.30), transparent 60%),
        radial-gradient(circle at 70% 55%, rgba(80,200,255,0.18), transparent 65%),
        radial-gradient(circle at 55% 25%, rgba(255,120,200,0.14), transparent 65%),
        radial-gradient(circle at 50% 80%, rgba(120,255,220,0.10), transparent 60%);
    filter: blur(140px);
    opacity: 0.9;
    animation: nebulaMove 14s ease-in-out infinite alternate;
    z-index: 0;
    pointer-events: none;
}

@keyframes nebulaMove{
    from { transform: scale(1); }
    to   { transform: scale(1.2); }
}

/* 🌟 Deep star layers (gives depth) */
.stars-1, .stars-2, .stars-3{
    position: absolute;
    inset: 0;
    pointer-events: none;
    z-index: 1;
}

.stars-1{
    background-image:
        radial-gradient(1px 1px at 10% 20%, rgba(255,255,255,0.9), transparent),
        radial-gradient(1px 1px at 35% 65%, rgba(255,255,255,0.7), transparent),
        radial-gradient(1px 1px at 70% 30%, rgba(255,255,255,0.8), transparent),
        radial-gradient(1px 1px at 90% 75%, rgba(255,255,255,0.6), transparent);
    opacity: 0.35;
    animation: starDrift1 38s linear infinite;
}

.stars-2{
    background-image:
        radial-gradient(2px 2px at 20% 40%, rgba(200,220,255,0.85), transparent),
        radial-gradient(2px 2px at 55% 20%, rgba(255,255,255,0.75), transparent),
        radial-gradient(2px 2px at 80% 60%, rgba(210,230,255,0.70), transparent);
    opacity: 0.22;
    animation: starDrift2 55s linear infinite;
}

.stars-3{
    background-image:
        radial-gradient(1px 1px at 15% 80%, rgba(255,255,255,0.55), transparent),
        radial-gradient(1px 1px at 50% 50%, rgba(255,255,255,0.45), transparent),
        radial-gradient(1px 1px at 85% 15%, rgba(255,255,255,0.50), transparent);
    opacity: 0.18;
    animation: starDrift3 75s linear infinite;
}

@keyframes starDrift1{
    from { transform: translateY(0); }
    to   { transform: translateY(-260px); }
}
@keyframes starDrift2{
    from { transform: translateY(0); }
    to   { transform: translateY(-420px); }
}
@keyframes starDrift3{
    from { transform: translateY(0); }
    to   { transform: translateY(-600px); }
}

/* 🌑 Vignette for cinematic depth */
.vignette{
    position: absolute;
    inset: 0;
    background: radial-gradient(circle, transparent 30%, rgba(0,0,0,0.65) 100%);
    z-index: 2;
    pointer-events: none;
}

/* ☄️ Real shooting stars (move with head direction) */
.meteor{
    position: absolute;
    width: 260px;
    height: 2px;
    opacity: 0;
    z-index: 3;
    pointer-events: none;

    /* The head is bright at the start, tail fades */
    background: linear-gradient(
        90deg,
        rgba(255,255,255,0.95) 0%,
        rgba(255,255,255,0.55) 30%,
        transparent 100%
    );

    filter: drop-shadow(0 0 10px rgba(160,200,255,0.9));
    transform: rotate(35deg);
    animation: meteorFly 3.2s linear infinite;
}

/* Different meteors */
.meteor.m1{ top: 10%; left: -40%; animation-delay: 0.5s; }
.meteor.m2{ top: 30%; left: -50%; width: 220px; animation-delay: 1.8s; opacity: 0.9; }
.meteor.m3{ top: 55%; left: -45%; width: 300px; animation-delay: 3.0s; opacity: 0.8; }
.meteor.m4{ top: 75%; left: -60%; width: 260px; animation-delay: 4.3s; opacity: 0.7; }

@keyframes meteorFly{
    0%{
        transform: translateX(0) translateY(0) rotate(35deg);
        opacity: 0;
    }
    8%{
        opacity: 1;
    }
    100%{
        transform: translateX(180vw) translateY(85vh) rotate(35deg);
        opacity: 0;
    }
}

/* 🚀 Center content */
.center{
    position: relative;
    z-index: 5;
    text-align: center;
    padding: 20px;
}

/* 🌌 COSMIC projected text */
.cosmic-text{
    font-family: "Orbitron", sans-serif;
    font-size: 5.4rem;
    font-weight: 900;
    letter-spacing: 10px;
    text-transform: uppercase;
    line-height: 1;
    display: inline-block;
    position: relative;

    color: transparent;
    background: linear-gradient(90deg, #7faeff, #ffffff);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;

    filter: drop-shadow(0 0 35px rgba(138,180,255,0.65));
}

/* ✨ Lively dust INSIDE COSMIC letters */
.cosmic-text::after{
    content: "";
    position: absolute;
    inset: 0;

    /* Moving star texture */
    background:
        radial-gradient(circle at 10% 30%, rgba(255,255,255,1), transparent 22%),
        radial-gradient(circle at 30% 60%, rgba(190,220,255,1), transparent 24%),
        radial-gradient(circle at 55% 25%, rgba(255,255,255,0.95), transparent 22%),
        radial-gradient(circle at 80% 55%, rgba(210,230,255,0.9), transparent 25%),
        radial-gradient(circle at 65% 85%, rgba(255,255,255,0.85), transparent 28%);

    opacity: 1;
    animation: dustInside 1.2s linear infinite;
    mix-blend-mode: screen;

    /* Clip dust inside the text */
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
}

/* Make it move faster and more visible */
@keyframes dustInside{
    from { transform: translateX(-35px) translateY(25px); }
    to   { transform: translateX(35px) translateY(-25px); }
}

/* Subtitle font upgraded */
.subtitle{
    margin-top: 16px;
    font-family: "Poppins", sans-serif;
    font-size: 1.25rem;
    font-weight: 500;
    opacity: 0.82;
    letter-spacing: 4px;
    text-transform: uppercase;
    color: rgba(255,255,255,0.9);
}

/* Arrow button */
.arrow-btn{
    margin-top: 55px;
    width: 64px;
    height: 64px;
    border-radius: 50%;
    border: 1px solid rgba(255,255,255,0.18);
    background: rgba(15,20,45,0.55);
    backdrop-filter: blur(16px);
    cursor: pointer;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    box-shadow: 0 0 40px rgba(138,180,255,0.28);
    transition: transform 0.3s ease, box-shadow 0.3s ease;
}

.arrow-btn:hover{
    transform: translateY(-6px);
    box-shadow: 0 0 65px rgba(138,180,255,0.55);
}

.arrow{
    width: 18px;
    height: 18px;
    border-right: 3px solid rgba(255,255,255,0.92);
    border-bottom: 3px solid rgba(255,255,255,0.92);
    transform: rotate(-45deg);
    margin-top: 4px;
}
</style>
</head>

<body>

<div class="nebula"></div>

<div class="stars-1"></div>
<div class="stars-2"></div>
<div class="stars-3"></div>

<div class="vignette"></div>

<div class="meteor m1"></div>
<div class="meteor m2"></div>
<div class="meteor m3"></div>
<div class="meteor m4"></div>

<div class="center">
    <div class="cosmic-text">COSMIC</div>
    <div class="subtitle">AI PowerPoint Maker</div>

    <button class="arrow-btn" onclick="location.href='/user-choice'" aria-label="Continue">
        <div class="arrow"></div>
    </button>
</div>

</body>
</html>
