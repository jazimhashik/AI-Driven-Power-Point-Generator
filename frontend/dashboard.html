<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard | AI PPT Generator</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=DM+Sans:wght@400;500;700;800&display=swap" rel="stylesheet">

<style>
*{
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

html{
    overflow: hidden;
}

body{
    height: 100vh;
    overflow: hidden;
    display: flex;
    color: #fff;
    font-family: "Inter", sans-serif;
    background: radial-gradient(circle at top, #0b1020 0%, #05060c 55%, #020309 100%);
    position: relative;
}

/* 🌌 Global nebula */
.bg-nebula{
    position: absolute;
    inset: -35%;
    background:
        radial-gradient(circle at 25% 35%, rgba(120,80,255,0.28), transparent 60%),
        radial-gradient(circle at 70% 60%, rgba(80,200,255,0.18), transparent 65%),
        radial-gradient(circle at 55% 25%, rgba(255,120,200,0.12), transparent 65%),
        radial-gradient(circle at 50% 80%, rgba(120,255,220,0.08), transparent 60%);
    filter: blur(140px);
    opacity: 0.95;
    animation: nebulaMove 14s ease-in-out infinite alternate;
    pointer-events: none;
    z-index: 0;
}

@keyframes nebulaMove{
    from { transform: scale(1); }
    to   { transform: scale(1.18); }
}

/* ✨ Star layers */
.bg-stars-1, .bg-stars-2, .bg-stars-3{
    position: absolute;
    inset: 0;
    pointer-events: none;
    z-index: 1;
}

.bg-stars-1{
    background-image:
        radial-gradient(1px 1px at 10% 15%, rgba(255,255,255,0.9), transparent),
        radial-gradient(1px 1px at 20% 75%, rgba(255,255,255,0.8), transparent),
        radial-gradient(1px 1px at 35% 40%, rgba(255,255,255,0.75), transparent),
        radial-gradient(1px 1px at 50% 60%, rgba(255,255,255,0.7), transparent),
        radial-gradient(1px 1px at 65% 25%, rgba(255,255,255,0.8), transparent),
        radial-gradient(1px 1px at 80% 55%, rgba(255,255,255,0.7), transparent),
        radial-gradient(1px 1px at 90% 20%, rgba(255,255,255,0.6), transparent);
    opacity: 0.45;
    animation: starDrift1 55s linear infinite;
}

.bg-stars-2{
    background-image:
        radial-gradient(2px 2px at 15% 35%, rgba(200,220,255,0.85), transparent),
        radial-gradient(2px 2px at 45% 20%, rgba(255,255,255,0.8), transparent),
        radial-gradient(2px 2px at 70% 75%, rgba(210,230,255,0.75), transparent),
        radial-gradient(2px 2px at 88% 45%, rgba(200,220,255,0.7), transparent);
    opacity: 0.22;
    animation: starDrift2 75s linear infinite;
}

.bg-stars-3{
    background-image:
        radial-gradient(1px 1px at 12% 55%, rgba(255,255,255,0.55), transparent),
        radial-gradient(1px 1px at 38% 85%, rgba(255,255,255,0.5), transparent),
        radial-gradient(1px 1px at 58% 35%, rgba(255,255,255,0.45), transparent),
        radial-gradient(1px 1px at 82% 10%, rgba(255,255,255,0.5), transparent);
    opacity: 0.18;
    animation: starDrift3 95s linear infinite;
}

@keyframes starDrift1{
    from { transform: translateY(0); }
    to   { transform: translateY(-320px); }
}
@keyframes starDrift2{
    from { transform: translateY(0); }
    to   { transform: translateY(-520px); }
}
@keyframes starDrift3{
    from { transform: translateY(0); }
    to   { transform: translateY(-720px); }
}

/* ☄️ Shooting stars */
.meteor{
    position: absolute;
    width: 280px;
    height: 2px;
    opacity: 0;
    z-index: 2;
    pointer-events: none;
    background: linear-gradient(
        90deg,
        rgba(255,255,255,0.95) 0%,
        rgba(255,255,255,0.55) 30%,
        transparent 100%
    );
    filter: drop-shadow(0 0 10px rgba(160,200,255,0.9));
    transform: rotate(35deg);
    animation: meteorFly 3.2s linear infinite;
}

.meteor.m1{ top: 12%; left: -45%; animation-delay: 0.5s; }
.meteor.m2{ top: 28%; left: -55%; width: 230px; animation-delay: 1.6s; }
.meteor.m3{ top: 52%; left: -50%; width: 320px; animation-delay: 2.8s; }
.meteor.m4{ top: 72%; left: -60%; width: 260px; animation-delay: 4.1s; }

@keyframes meteorFly{
    0%{
        transform: translateX(0) translateY(0) rotate(35deg);
        opacity: 0;
    }
    10%{
        opacity: 1;
    }
    100%{
        transform: translateX(180vw) translateY(85vh) rotate(35deg);
        opacity: 0;
    }
}

/* Layout wrapper */
.app{
    position: relative;
    z-index: 5;
    display: flex;
    width: 100%;
    height: 100vh;
}

/* SIDEBAR */
.sidebar{
    width: 270px;
    height: 100vh;
    padding: 26px 20px;
    position: relative;
    overflow: hidden;

    background: rgba(10, 14, 30, 0.65);
    border-right: 1px solid rgba(255,255,255,0.08);
    backdrop-filter: blur(18px);
}

/* Sidebar animated layer */
.sidebar::before{
    content: "";
    position: absolute;
    inset: -50%;
    background: linear-gradient(
        120deg,
        transparent 46%,
        rgba(120,180,255,0.10),
        transparent 54%
    );
    animation: spinSide 55s linear infinite;
    opacity: 0.7;
}

@keyframes spinSide{
    from { transform: rotate(0deg); }
    to   { transform: rotate(360deg); }
}

.sidebar-inner{
    position: relative;
    z-index: 2;
}

.brand{
    font-family: "DM Sans", sans-serif;
    font-size: 1.4rem;
    font-weight: 800;
    letter-spacing: 1px;
    margin-bottom: 26px;

    color: transparent;
    background: linear-gradient(90deg, #8ab4ff, #ffffff);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;

    filter: drop-shadow(0 0 20px rgba(138,180,255,0.45));
}

.nav a{
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 12px 14px;
    margin-bottom: 10px;
    border-radius: 14px;
    color: rgba(255,255,255,0.78);
    text-decoration: none;
    font-weight: 600;
    transition: background 0.25s ease, transform 0.25s ease, color 0.25s ease;
    border: 1px solid rgba(255,255,255,0.06);
    background: rgba(255,255,255,0.02);
}

.nav a:hover{
    background: rgba(138,180,255,0.12);
    color: #ffffff;
    transform: translateX(4px);
    border-color: rgba(138,180,255,0.25);
}

.nav a.active{
    background: rgba(138,180,255,0.16);
    border-color: rgba(138,180,255,0.30);
    color: #ffffff;
}

/* MAIN */
.main{
    flex: 1;
    height: 100vh;
    overflow-y: auto;
    padding: 34px 34px 40px;
}

/* Topbar */
.topbar{
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 26px;
    gap: 16px;
}

.topbar h2{
    font-family: "DM Sans", sans-serif;
    font-size: 1.55rem;
    font-weight: 800;
    letter-spacing: 0.3px;
}

.usage{
    padding: 10px 16px;
    border-radius: 999px;
    font-weight: 800;
    font-size: 0.95rem;
    color: rgba(255,255,255,0.92);
    background: rgba(15,20,45,0.55);
    border: 1px solid rgba(255,255,255,0.10);
    backdrop-filter: blur(14px);
    box-shadow: 0 0 28px rgba(138,180,255,0.14);
}

/* CREATE HERO */
.create-hero{
    position: relative;
    overflow: hidden;
    border-radius: 28px;
    padding: 34px 34px;
    margin-bottom: 38px;

    background: rgba(15,20,45,0.60);
    border: 1px solid rgba(255,255,255,0.12);
    backdrop-filter: blur(18px);
    box-shadow: 0 0 70px rgba(138,180,255,0.18);
}

/* Hero glow layer */
.create-hero::before{
    content: "";
    position: absolute;
    inset: -60%;
    background:
        radial-gradient(circle at 25% 35%, rgba(120,80,255,0.22), transparent 55%),
        radial-gradient(circle at 70% 55%, rgba(80,200,255,0.18), transparent 55%),
        radial-gradient(circle at 55% 20%, rgba(255,120,200,0.12), transparent 55%);
    filter: blur(120px);
    opacity: 0.9;
    animation: heroGlow 12s ease-in-out infinite alternate;
    z-index: 0;
}

@keyframes heroGlow{
    from { transform: scale(1); }
    to   { transform: scale(1.18); }
}

.hero-inner{
    position: relative;
    z-index: 2;
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 18px;
    flex-wrap: wrap;
}

.create-hero h1{
    font-family: "DM Sans", sans-serif;
    font-size: 1.9rem;
    font-weight: 900;
    margin-bottom: 6px;
    letter-spacing: 0.2px;
}

.create-hero p{
    opacity: 0.82;
    line-height: 1.5;
}

/* Special Create button */
.btn-create{
    display: inline-flex;
    align-items: center;
    gap: 10px;
    padding: 14px 18px;
    border-radius: 18px;
    text-decoration: none;
    font-weight: 900;
    font-size: 1rem;

    color: #0b1020;
    background: linear-gradient(135deg, #8ab4ff, #cfd9ff);
    box-shadow: 0 0 35px rgba(138,180,255,0.55);
    transition: transform 0.25s ease, box-shadow 0.25s ease;
}

.btn-create:hover{
    transform: translateY(-3px);
    box-shadow: 0 0 55px rgba(138,180,255,0.85);
}

.ai-chip{
    padding: 6px 10px;
    border-radius: 12px;
    font-size: 0.75rem;
    font-weight: 900;
    letter-spacing: 0.8px;
    color: rgba(255,255,255,0.95);
    background: rgba(15,20,45,0.55);
    border: 1px solid rgba(255,255,255,0.12);
    backdrop-filter: blur(14px);
}

/* Section title */
.section-title{
    font-family: "DM Sans", sans-serif;
    font-size: 1.15rem;
    font-weight: 800;
    margin-bottom: 18px;
    letter-spacing: 0.3px;
}

/* Grid */
.grid{
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
    gap: 22px;
}

/* Cards */
.card{
    position: relative;
    overflow: hidden;
    border-radius: 22px;
    padding: 18px;
    background: rgba(15,20,45,0.55);
    border: 1px solid rgba(255,255,255,0.10);
    backdrop-filter: blur(16px);
    box-shadow: 0 0 40px rgba(138,180,255,0.12);
    transition: transform 0.25s ease, box-shadow 0.25s ease, border-color 0.25s ease;
}

.card:hover{
    transform: translateY(-6px);
    box-shadow: 0 0 70px rgba(138,180,255,0.22);
    border-color: rgba(138,180,255,0.22);
}

.thumb{
    height: 140px;
    border-radius: 18px;
    background: linear-gradient(135deg, rgba(10,14,30,0.95), rgba(30,50,80,0.55));
    border: 1px solid rgba(255,255,255,0.08);
    margin-bottom: 14px;
    position: relative;
}

/* PPT badge */
.ppt-badge{
    position: absolute;
    top: 12px;
    right: 12px;
    padding: 6px 10px;
    border-radius: 12px;
    font-size: 0.72rem;
    font-weight: 900;
    letter-spacing: 0.8px;
    color: rgba(255,255,255,0.95);
    background: rgba(15,20,45,0.65);
    border: 1px solid rgba(255,255,255,0.12);
    backdrop-filter: blur(12px);
    box-shadow: 0 0 25px rgba(138,180,255,0.25);
}

.card h3{
    font-family: "DM Sans", sans-serif;
    font-size: 1.05rem;
    font-weight: 800;
    margin-bottom: 6px;
}

.card p{
    opacity: 0.75;
    margin-bottom: 14px;
    font-size: 0.92rem;
}

/* Download button */
.btn-download{
    display: inline-flex;
    align-items: center;
    justify-content: center;
    width: 100%;
    padding: 12px 14px;
    border-radius: 16px;
    text-decoration: none;
    font-weight: 900;
    font-size: 0.95rem;

    color: #0b1020;
    background: linear-gradient(135deg, #8ab4ff, #cfd9ff);
    box-shadow: 0 0 28px rgba(138,180,255,0.40);
    transition: transform 0.25s ease, box-shadow 0.25s ease;
}

.btn-download:hover{
    transform: translateY(-2px);
    box-shadow: 0 0 42px rgba(138,180,255,0.70);
}

/* Responsive */
@media(max-width: 860px){
    .sidebar{
        width: 230px;
    }
}

@media(max-width: 720px){
    body{
        overflow: auto;
    }
    .app{
        flex-direction: column;
    }
    .sidebar{
        width: 100%;
        height: auto;
        border-right: none;
        border-bottom: 1px solid rgba(255,255,255,0.08);
    }
    .main{
        height: auto;
    }
}

/* Tabs */
.tabs-container{
    display: flex;
    gap: 8px;
    margin-bottom: 18px;
}

.tab-btn{
    padding: 10px 20px;
    border-radius: 12px;
    border: 1px solid rgba(255,255,255,0.12);
    background: rgba(255,255,255,0.05);
    color: rgba(255,255,255,0.75);
    font-weight: 600;
    font-size: 0.9rem;
    cursor: pointer;
    transition: all 0.25s ease;
}

.tab-btn:hover{
    background: rgba(138,180,255,0.15);
    color: #fff;
}

.tab-btn.active{
    background: rgba(138,180,255,0.22);
    border-color: rgba(138,180,255,0.40);
    color: #fff;
    box-shadow: 0 0 20px rgba(138,180,255,0.2);
}

/* View toggle for cards */
.grid.list-view{
    display: flex;
    flex-direction: column;
    gap: 12px;
}

.grid.list-view .card{
    display: flex;
    flex-direction: row;
    align-items: center;
    padding: 14px 18px;
}

.grid.list-view .thumb{
    width: 120px;
    height: 70px;
    margin-bottom: 0;
    margin-right: 16px;
    flex-shrink: 0;
}

.grid.list-view .card-content{
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: space-between;
}

.grid.list-view .card-info{
    flex: 1;
}

.grid.list-view .card h3{
    margin-bottom: 2px;
}

.grid.list-view .card p{
    margin-bottom: 0;
    font-size: 0.85rem;
}

.grid.list-view .btn-download{
    width: auto;
    padding: 10px 18px;
}
</style>
</head>

<body>

<div class="bg-nebula"></div>
<div class="bg-stars-1"></div>
<div class="bg-stars-2"></div>
<div class="bg-stars-3"></div>

<div class="meteor m1"></div>
<div class="meteor m2"></div>
<div class="meteor m3"></div>
<div class="meteor m4"></div>

<div class="app">

    <!-- SIDEBAR -->
    <div class="sidebar">
        <div class="sidebar-inner">
            <div class="brand">COSMIC AI</div>

            <div class="nav">
                <a href="/dashboard" class="active">Dashboard</a>
                <a href="/create">Create</a>
                <a href="/presentations">My Presentations</a>
                <a href="/usage">Usage</a>
                <a href="/logout">Logout</a>
            </div>
        </div>
    </div>

    <!-- MAIN -->
    <div class="main">

        <!-- TOP BAR -->
        <div class="topbar">
            <h2 id="welcomeMsg">Welcome</h2>
            <div class="usage" id="usageDisplay">PPTs left today: --</div>
        </div>

        <!-- CREATE HERO -->
        <div class="create-hero">
            <div class="hero-inner">
                <div>
                    <h1>Create a new presentation</h1>
                    <p>Generate stunning AI-powered slides in minutes.</p>
                </div>

                <a href="/create" class="btn-create">
                    Create new <span class="ai-chip">AI</span>
                </a>
            </div>
        </div>

        <!-- RECENT -->
        <div class="tabs-container" style="display: flex; gap: 8px; margin-bottom: 18px;">
            <button class="tab-btn active" onclick="switchTab('recent')" id="tab-recent">Recent</button>
            <button class="tab-btn" onclick="switchTab('all')" id="tab-all">All Presentations</button>
        </div>

        <div class="section-title" id="recentTitle">Recent Presentations</div>

        <div class="grid" id="presentationsGrid">
            <!-- Dynamically populated -->
        </div>

    </div>

</div>

<script>
// Global state
let currentTab = 'recent';
let allPresentations = [];

// Helper function to handle fetch with retry logic
async function fetchWithRetry(url, options = {}, maxRetries = 2) {
    let lastError;
    
    for (let attempt = 1; attempt <= maxRetries; attempt++) {
        try {
            const response = await fetch(url, options);
            
            // If unauthorized (401), redirect to login
            if (response.status === 401) {
                console.error('Session expired. Redirecting to login...');
                window.location.href = '/login';
                throw new Error('Session expired. Please login again.');
            }
            
            // If server error (500), retry
            if (response.status >= 500 && attempt < maxRetries) {
                console.warn(`Server error ${response.status}, attempt ${attempt}/${maxRetries}. Retrying...`);
                await new Promise(resolve => setTimeout(resolve, 1000 * attempt)); // Exponential backoff
                continue;
            }
            
            return response;
        } catch (error) {
            lastError = error;
            console.error(`Fetch attempt ${attempt} failed:`, error);
            
            if (attempt < maxRetries) {
                await new Promise(resolve => setTimeout(resolve, 1000 * attempt));
            }
        }
    }
    
    throw lastError;
}

// Validate session before making API calls
async function validateSession() {
    try {
        const response = await fetch('/api/user/session');
        if (!response.ok) {
            console.error('Session validation failed');
            window.location.href = '/login';
            return false;
        }
        const data = await response.json();
        console.log('Session validated:', data);
        return true;
    } catch (error) {
        console.error('Session validation error:', error);
        window.location.href = '/login';
        return false;
    }
}

// Fetch and display user data
async function loadDashboard() {
    console.log('Loading dashboard...');
    
    try {
        // First validate session to ensure it's properly initialized
        const sessionValid = await validateSession();
        if (!sessionValid) {
            return; // Will redirect to login
        }
        
        console.log('Session valid. Fetching data...');
        
        // Fetch presentations
        const presResponse = await fetchWithRetry('/api/user/presentations?limit=50');
        if (!presResponse.ok) {
            const errorData = await presResponse.json().catch(() => ({}));
            console.error('Failed to fetch presentations:', errorData);
            throw new Error(errorData.message || `HTTP error! status: ${presResponse.status}`);
        }
        const presentations = await presResponse.json();
        console.log('Presentations loaded:', presentations.length);
        allPresentations = presentations;
        
        // Fetch usage
        const usageResponse = await fetchWithRetry('/api/user/usage');
        if (!usageResponse.ok) {
            const errorData = await usageResponse.json().catch(() => ({}));
            console.error('Failed to fetch usage:', errorData);
            throw new Error(errorData.message || `HTTP error! status: ${usageResponse.status}`);
        }
        const usage = await usageResponse.json();
        console.log('Usage loaded:', usage);
        
        // Fetch profile
        const profileResponse = await fetchWithRetry('/api/user/profile');
        if (!profileResponse.ok) {
            const errorData = await profileResponse.json().catch(() => ({}));
            console.error('Failed to fetch profile:', errorData);
            throw new Error(errorData.message || `HTTP error! status: ${profileResponse.status}`);
        }
        const profile = await profileResponse.json();
        console.log('Profile loaded:', profile);
        
        // Update welcome message with user's name
        if (profile.name) {
            document.getElementById('welcomeMsg').textContent = `Welcome, ${profile.name.split(' ')[0]}!`;
        } else if (profile.username) {
            document.getElementById('welcomeMsg').textContent = `Welcome, ${profile.username.split(' ')[0]}!`;
        }
        
        // Update usage display
        const usageDiv = document.getElementById('usageDisplay');
        usageDiv.textContent = `PPTs left today: ${usage.ppts_left_today}/${usage.daily_limit}`;
        
        // Build presentations grid based on current tab
        renderPresentations();
        
        console.log('Dashboard loaded successfully!');
        
    } catch (error) {
        console.error('Error loading dashboard:', error);
        const errorMsg = error.message || 'Unknown error';
        document.getElementById('presentationsGrid').innerHTML = `<div style="grid-column: 1/-1; text-align: center; padding: 40px 20px; color: #ff6b6b;"><p>Error loading presentations: ${errorMsg}</p><p style="margin-top: 10px; font-size: 0.9em; opacity: 0.7;">Please <a href="/dashboard" onclick="location.reload()" style="color: #8ab4ff;">refresh the page</a> or try again.</p></div>`;
    }
}

function switchTab(tab) {
    currentTab = tab;
    
    // Update tab buttons
    document.getElementById('tab-recent').classList.toggle('active', tab === 'recent');
    document.getElementById('tab-all').classList.toggle('active', tab === 'all');
    
    // Update section title
    const title = document.getElementById('recentTitle');
    title.textContent = tab === 'recent' ? 'Recent Presentations' : 'All Presentations';
    
    // Render presentations
    renderPresentations();
}

function renderPresentations() {
    const grid = document.getElementById('presentationsGrid');
    const presentations = currentTab === 'recent' ? allPresentations.slice(0, 10) : allPresentations;
    
    if (presentations.length === 0) {
        const emptyMsg = currentTab === 'recent' 
            ? 'No presentations yet. Start by creating one!'
            : 'You haven\'t created any presentations yet.';
        grid.innerHTML = `<div style="grid-column: 1/-1; text-align: center; padding: 40px 20px; opacity: 0.7;"><p>${emptyMsg}</p></div>`;
        return;
    }
    
    // Show in list view for "All" tab
    if (currentTab === 'all') {
        grid.classList.add('list-view');
    } else {
        grid.classList.remove('list-view');
    }
    
    grid.innerHTML = presentations.map(pres => {
        const date = new Date(pres.created_at);
        const formatted = formatDate(date);
        const safeName = pres.topic || 'Untitled';
        const slideCount = pres.slide_count || 'N/A';
        
        // Construct preview image path (remove .pptx extension)
        const filenameBase = pres.filename ? pres.filename.replace('.pptx', '') : '';
        const previewPath = filenameBase ? `/generated_previews/${filenameBase}/slide_1.png` : '';
        
        if (currentTab === 'all') {
            return `
                <div class="card">
                    <div class="thumb" ${previewPath ? `style="background-image: url('${previewPath}'); background-size: cover; background-position: center;"` : ''}>
                        ${!previewPath ? '<div class="ppt-badge">' + pres.presentation_type + '</div>' : '<div class="ppt-badge" style="position:absolute;top:10px;right:10px;">' + pres.presentation_type + '</div>'}
                    </div>
                    <div class="card-content">
                        <div class="card-info">
                            <h3>${safeName.substring(0, 50)}</h3>
                            <p>${formatted} • ${slideCount} slides</p>
                        </div>
                        <a href="/generated_ppts/${pres.filename}" class="btn-download">Download</a>
                    </div>
                </div>
            `;
        }
        
        return `
            <div class="card">
                <div class="thumb" ${previewPath ? `style="background-image: url('${previewPath}'); background-size: cover; background-position: center;"` : ''}>
                    ${!previewPath ? '<div class="ppt-badge">' + pres.presentation_type + '</div>' : '<div class="ppt-badge" style="position:absolute;top:10px;right:10px;">' + pres.presentation_type + '</div>'}
                </div>
                <h3>${safeName.substring(0, 50)}</h3>
                <p>${formatted}</p>
                <a href="/generated_ppts/${pres.filename}" class="btn-download">⬇ Download</a>
            </div>
        `;
    }).join('');
}

function formatDate(date) {
    const now = new Date();
    const diff = now - date;
    const seconds = Math.floor(diff / 1000);
    const minutes = Math.floor(seconds / 60);
    const hours = Math.floor(minutes / 60);
    const days = Math.floor(hours / 24);
    
    if (days > 0) return `${days} day${days > 1 ? 's' : ''} ago`;
    if (hours > 0) return `${hours} hour${hours > 1 ? 's' : ''} ago`;
    if (minutes > 0) return `${minutes} minute${minutes > 1 ? 's' : ''} ago`;
    return 'Just now';
}

// Load on page load
document.addEventListener('DOMContentLoaded', loadDashboard);
